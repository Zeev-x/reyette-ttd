name: Build APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build Debug APK
        uses: digreatbrian/buildozer-action@v1
        with:
          buildozer_version: latest
          python_version: "3.11"
          buildozer_command: android debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: bin/*.apk

      - name: Build Release APK
        uses: digreatbrian/buildozer-action@v1
        with:
          buildozer_version: latest
          python_version: "3.11"
          buildozer_command: android release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: bin/*.apk
