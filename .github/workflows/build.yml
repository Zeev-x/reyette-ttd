name: Build APK

on:
workflow_dispatch:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
- name: Checkout Repository
  uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.11"

- name: Setup Java
  uses: actions/setup-java@v4
  with:
    distribution: temurin
    java-version: "17"

- name: Setup Android SDK
  uses: android-actions/setup-android@v3

- name: Install Android SDK Components
  run: |
    sdkmanager --install \
      "platform-tools" \
      "platforms;android-33" \
      "build-tools;34.0.0" \
      "ndk;25.2.9519653"

    yes | sdkmanager --licenses

- name: Verify AIDL
  run: |
    find $ANDROID_SDK_ROOT -name aidl

- name: Install System Dependencies
  run: |
    sudo apt update
    sudo apt install -y \
      zip unzip autoconf automake libtool \
      pkg-config zlib1g-dev libncurses5-dev \
      libncursesw5-dev cmake git \
      build-essential ccache \
      libffi-dev libssl-dev

- name: Install Python Dependencies
  run: |
    python -m pip install --upgrade pip
    pip install buildozer cython

- name: Set Android Environment
  run: |
    echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
    echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

- name: Build APK
  run: |
    buildozer android debug

- name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: TikTokDLR-APK
    path: bin/*.apk
```
